baseURL: 'https://colorivine.github.io/Personal-Portfolio/'
languageCode: en-ushug
title: Victor Touroul
theme: ["PaperMod"]

publishDir: /docs

params:
  homeInfoParams:
    Title: "Portfolio"
  buttons:
    - name: Posts
      url: "/posts"
  socialIcons: # optional
    - name: "Instagram"
      url: "https://www.instagram.com/colorivine/"
    - name: "Linkedin"
      url: "https://www.linkedin.com/in/victor-touroul/"
    - name: "Itchio"
      url: "https://colorivine.itch.io/"
  

  profileMode:
    enabled: true
    
    subtitle: i18n "homeSubtitle"
    imageUrl: "./imgs/profile.gif" # optional
    imageTitle: "me with my turning beans yepee" # optional
    imageWidth: 200 # custom size
    imageHeight: 200 # custom size
    buttons:
      - name: ↓ Portfolio ↓
        url: "#portfolio"
  
  ShowBreadCrumbs: true
  ShowPostNavLinks: true

languages:
  en:
    languageName: "English"
    weight: 2
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Portfolio
          url : .#portfolio
          weight : 1
        - name: Posts
          url: posts
          weight: 2
        - name: Tags
          url: tags/
          weight: 3
        
  fr:
    languageName: "French"
    weight: 1
    menu:
      main:
        - name: Portfolio
          url : .#portfolio
          weight : 1
        - name: Posts
          url: fr/posts
          weight: 2
        - name: Tags
          url: fr/tags
          weight: 3